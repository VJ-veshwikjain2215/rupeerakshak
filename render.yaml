services:
  # 1. AI Service (FastAPI)
  - type: web
    name: flowfund-ai-service
    runtime: docker
    dockerContext: ./ai-service
    dockerfilePath: ./ai-service/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8000

  # 2. Backend Service (Spring Boot)
  - type: web
    name: flowfund-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8080
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ARIMA_API_URL
        value: http://flowfund-ai-service:8000/forecast
      - key: FRONTEND_URL
        value: https://rupeerakshak.vercel.app/

spring.application.name=flowfund-engine

# --- Database Configuration ---
# Use H2 by default for development, but allow override via SPRING_DATASOURCE_URL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:flowfund;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8085}

# --- External Service URLs ---
# Defaults to localhost for development
app.ai-service.url=${ARIMA_API_URL:http://localhost:5005/forecast}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# --- Google OAuth2 Credentials ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# --- Error Handling ---
server.error.include-message=always

# --- Flyway Configuration (Handling existing Supabase tables) ---
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
